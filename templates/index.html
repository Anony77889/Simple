<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>CC Checker with Braintree Integration</title>\n    <script src="https://js.braintreegateway.com/web/3.82.0/js/client.min.js"></script>\n    <script src="https://js.braintreegateway.com/web/3.82.0/js/hosted-fields.min.js"></script>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <div class="container">\n        <h1>Credit Card Checker</h1>\n        <form id="payment-form">\n            <div id="card-element"></div>\n            <button type="submit">Pay</button>\n        </form>\n        <div id="card-errors" role="alert"></div>\n    </div>\n    <script>\n        var form = document.getElementById('payment-form');\n        var cardElement = document.getElementById('card-element');\n        var clientToken = 'YOUR_CLIENT_TOKEN'; // Fetch this from your server and render it here!\n        braintree.dropin.create({\n            authorization: clientToken,\n            container: 'card-element'\n        }, function (createErr, instance) {\n            form.addEventListener('submit', function (event) {\n                event.preventDefault();\n                instance.requestPaymentMethod(function (err, payload) {\n                    if (err) {\n                        // Handle error\n                        document.getElementById('card-errors').innerText = err.message;\n                        return;\n                    }\n                    // Send payload.nonce to your server for payment processing\n                    console.log(payload.nonce);\n                });\n            });\n        });\n    </script>\n</body>\n</html>
